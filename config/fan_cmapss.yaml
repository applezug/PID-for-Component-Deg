# 风扇组件 - CMAPSS 实验配置（方案 5.1）
# 传感器：T2(列2)、P2(列6)、Nf(列9)，对应方案 3.2 风扇 1,5,8

data:
  data_root: "data/cmapss"
  dataset: "FD003"   # 方案建议 FD003/FD004 含风扇+压气机故障
  seq_length: 256
  train_ratio: 0.7
  val_ratio: 0.15
  # 风扇传感器（0-based 列索引）: T2=2, P2=6, Nf=9
  sensor_indices: [2, 6, 9]
  normalize: true

diffusion:
  timesteps: 200
  sampling_timesteps: 50
  Nsample: 1024
  temp_sample: 0.1
  beta_schedule: "cosine"

physics:
  enabled: true
  lambda_physics: 0.1   # 方案 5.1.3 建议 0.1 可调
  fan:
    # 归一化空间约束：P2 ~ c1*(Nf+1)^2, T2 ~ c2*(Nf+1)；退化时 T2 单调上升
    monotonic_feature_idx: 0   # 0=T2

training:
  diffusion_train: false
  epochs: 200
  batch_size: 32
  learning_rate: 1.0e-4
  patience: 30
  seed: 42
  device: "cuda"

rul:
  failure_threshold: 0.8
  prediction_method: "trajectory"
  deg_feature_idx: 0   # T2 列（0=T2,1=P2,2=Nf）

output:
  save_dir: "results"
  exp_name: "fan_cmapss"
