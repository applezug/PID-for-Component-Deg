# Paper-aligned C-MAPSS / HPC settings (public reproduction).
# Use this config for results comparable to MCA (PGDP) and AIS (component) manuscripts.

data:
  data_root: "data/cmapss"
  dataset: "FD001"
  seq_length: 256
  train_ratio: 0.7
  val_ratio: 0.15
  sensor_indices: [2, 3, 7, 14]
  normalize: true

diffusion:
  degradation_model: "linear"
  timesteps: 200
  sampling_timesteps: 50
  Nsample: 1024
  temp_sample: 0.1
  beta_schedule: "cosine"
  beta_start: 1.0e-4
  beta_end: 1.0e-2

physics:
  enabled: true
  lambda_physics: 0.5
  compressor:
    eta_norm_bounds: [-1.5, 1.5]
    speed_pressure_coeff: null
    efficiency_bounds: [0.7, 0.9]
    monotonic_feature: "T30_residual"

training:
  diffusion_train: false
  epochs: 200
  batch_size: 32
  learning_rate: 1.0e-4
  patience: 30
  seed: 42
  device: "cuda"

rul:
  failure_threshold: 0.65
  prediction_method: "trajectory"
  deg_feature_idx: 1
  max_rul: 125

output:
  save_dir: "results"
  exp_name: "hpc_cmapss_paper"
