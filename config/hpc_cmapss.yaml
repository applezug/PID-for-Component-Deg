# HPC 高压压气机组件 - CMAPSS 实验配置

data:
  data_root: "data/cmapss"
  dataset: "FD001"  # FD001-FD004
  seq_length: 256
  train_ratio: 0.7
  val_ratio: 0.15
  # 传感器索引（根据 CMAPSS 文档）: T24=2, T30=3, P30=7, Nc=14
  sensor_indices: [2, 3, 7, 14]
  normalize: true

diffusion:
  degradation_model: "linear"   # MBD 退化先验: linear | exponential | power_law
  timesteps: 200
  sampling_timesteps: 50
  Nsample: 1024
  temp_sample: 0.1
  beta_schedule: "cosine"
  beta_start: 1.0e-4
  beta_end: 1.0e-2

physics:
  enabled: true
  lambda_physics: 0.5   # 物理损失权重
  # 策略2：归一化空间约束（主流程采用）
  compressor:
    eta_norm_bounds: [-1.5, 1.5]   # 策略2 效率边界，适应 [-1,1] 归一化空间
    speed_pressure_coeff: null     # 策略1/3 用；策略2 自动从训练数据拟合 coeff_norm
    efficiency_bounds: [0.7, 0.9]  # 策略1 用
    monotonic_feature: "T30_residual"

training:
  diffusion_train: false  # 设为 true 时执行扩散训练（噪声预测 + 物理损失），耗时较长
  epochs: 200
  batch_size: 32
  learning_rate: 1.0e-4
  patience: 30
  seed: 42
  device: "cuda"

rul:
  failure_threshold: 0.8
  prediction_method: "trajectory"
  deg_feature_idx: 1   # T30 列（0=T24,1=T30,2=P30,3=Nc）
  max_rul: 125          # C-MAPSS 截断 RUL（与 PHM08 一致）；轨迹步数转 cycles 时使用

output:
  save_dir: "results"
  exp_name: "hpc_cmapss"
